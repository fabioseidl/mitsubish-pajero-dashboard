[env:server_emulator]
platform  = espressif32
board     = esp32dev
framework = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder


lib_extra_dirs = ../../lib
build_flags    =
    -I../../lib/core/include
    -I../../projects/server/include

; session_accumulator lives in projects/server/src — pull it into this build
build_src_filter = +<*> +<../../../projects/server/src/session_accumulator.cpp>
